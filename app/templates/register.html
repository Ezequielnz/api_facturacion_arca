{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}
<h1>Registro de Usuario</h1>
<form action="/register" method="post">
    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
    </div>
    <div class="form-group">
        <label for="cuit">CUIT:</label>
        <input type="text" id="cuit" name="cuit" required pattern="[0-9]{11}" title="El CUIT debe tener 11 dígitos">
    </div>
    <div class="form-group">
        <label for="company_name">Nombre de la Empresa:</label>
        <input type="text" id="company_name" name="company_name" required>
    </div>    <button type="submit">Registrarse</button>
</form>
<div style="margin-top: 20px;">
    <p>¿Ya tienes una cuenta? <a href="/login-form">Iniciar Sesión</a></p>
    <a href="/"><button style="margin-top: 10px;">Volver al Inicio</button></a>
</div>
{% endblock %}
