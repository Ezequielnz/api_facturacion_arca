<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AFIP Web Services API{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">AFIP API</a>
            <div class="navbar-links">
                <a href="/">Home</a>
                {% if request.cookies.get("access_token") %}
                <a href="/profile">Profile</a>
                <a href="/logout">Logout</a>
                {% else %}
                <a href="/login-form">Login</a>
                <a href="/register-form">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; {% now 'Y' %} AFIP Web Services API. All rights reserved.</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
